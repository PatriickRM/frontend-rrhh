<!-- ============================================================
     Layout Component — RRHH Sistema Redesign
     ============================================================ -->

<!-- Overlay móvil -->
<div class="mobile-overlay"
     [class.visible]="sidebar.isMobileOpen"
     (click)="sidebar.closeMobile()">
</div>

<div class="app-shell">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <app-sidebar #sidebar></app-sidebar>

  <!-- ── Main area ────────────────────────────────────────── -->
  <div class="main-area">

    <!-- Topbar -->
    <header class="topbar">

      <!-- Mobile hamburger -->
      <button class="mobile-menu-btn" (click)="sidebar.openMobile()" aria-label="Abrir menú">
        <span class="material-icons-sharp">menu</span>
      </button>

      <div class="topbar-left">
        <span class="page-title">{{ pageTitle }}</span>
      </div>

      <div class="topbar-right">

        <!-- Dark mode toggle -->
        <button class="icon-btn" (click)="toggleDarkMode()" title="Alternar tema">
          <span class="material-icons-sharp">{{ isDark ? 'light_mode' : 'dark_mode' }}</span>
        </button>

        <!-- Notification bell -->
        <button class="icon-btn notif-btn" title="Notificaciones">
          <span class="material-icons-sharp">notifications</span>
          <span class="notif-dot"></span>
        </button>

        <!-- User chip -->
        <div class="user-chip">
          <div class="chip-avatar">{{ userInitials }}</div>
          <span class="chip-name">{{ userName }}</span>
        </div>

      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
